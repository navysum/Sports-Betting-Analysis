version: "3.9"

services:
  backend:
    build: ./backend
    container_name: soccerbet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - backend_data:/app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: soccerbet_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
