name: Daily Data Cache Refresh + CLV Snapshot

# Runs two jobs:
#
# 1. cache-refresh at 01:00 UTC: pre-warms API cache (standings, finished
#    matches, team histories) so morning predictions are instant.
#
# 2. clv-snapshot at 11:30 UTC: captures Pinnacle odds ~90 min before most
#    UK 3pm Saturday kickoffs. These are the closest-to-closing odds we can
#    get without a paid historical odds API. The snapshot updates any CLV log
#    entries that still lack pinnacle_closing_implied.

on:
  schedule:
    - cron: "0 1 * * *"    # 01:00 UTC — data cache refresh
    - cron: "30 11 * * *"  # 11:30 UTC — CLV closing-line snapshot
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  cache-refresh:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 1'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Wake backend (cold-start ping)
        run: |
          echo "Pinging backend to wake from sleep..."
          curl -sf --retry 5 --retry-delay 10 \
            https://sports-betting-analysis.onrender.com/health || true

      - name: Trigger cache refresh
        run: |
          echo "Triggering data cache refresh..."
          curl -sf -X POST \
            https://sports-betting-analysis.onrender.com/api/admin/refresh-cache || true
          echo "Cache refresh triggered."

      - name: Keep server alive during cache fetch
        run: |
          # Cache refresh fetches standings + matches for 9 leagues + team histories.
          # Rate-limited at 10 req/min → can take 15–20 min. Poll to keep Render alive.
          for i in $(seq 1 4); do
            sleep 270
            curl -sf https://sports-betting-analysis.onrender.com/api/admin/refresh-cache/status \
              > /dev/null 2>&1 || true
            echo "  Keep-alive ping $i/4 sent"
          done
          echo "Cache refresh keep-alive complete."

  clv-snapshot:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '30 11'))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake backend
        run: |
          curl -sf --retry 3 --retry-delay 10 \
            https://sports-betting-analysis.onrender.com/health || true

      - name: Trigger CLV closing-line snapshot
        run: |
          echo "Capturing Pinnacle closing odds for today's pending CLV entries..."
          curl -sf -X POST \
            https://sports-betting-analysis.onrender.com/api/admin/clv-snapshot || true
          echo "CLV snapshot triggered."
