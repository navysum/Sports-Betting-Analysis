name: Weekly Model Retrain

# Triggers a full model retrain every Sunday at 02:00 UTC.
# The retrain pipeline: download FDCO CSVs → fetch API training data
# → merge → train XGBoost + calibrators (70/15/15 split) → Dixon-Coles
# → optimize blend weights on clean 85–100% holdout → reload models.
#
# IMPORTANT: Render free-tier spins down after 15 min with no inbound HTTP
# traffic. The retrain takes ~25–35 min, so without keep-alive pings it gets
# killed mid-training. This workflow polls the retrain status every 5 minutes
# (up to 50 min) to keep the server alive until training completes.

on:
  schedule:
    - cron: "0 2 * * 0"   # 02:00 UTC every Sunday
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # allow up to 60 min for training + keep-alive loop

    steps:
      - name: Wake backend (cold-start ping)
        run: |
          echo "Pinging backend to wake from sleep..."
          curl -sf --retry 5 --retry-delay 15 \
            https://sports-betting-analysis.onrender.com/health || true
          echo "Backend awake (or timeout — continuing anyway)"

      - name: Trigger model retrain
        run: |
          echo "Triggering weekly model retrain..."
          response=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            https://sports-betting-analysis.onrender.com/api/admin/retrain \
            2>&1) || true
          echo "Response: $response"

      - name: Keep server alive + wait for completion
        run: |
          echo "Polling retrain status every 5 min (keeps Render server alive)..."
          for i in $(seq 1 10); do
            sleep 300
            status=$(curl -sf \
              "https://sports-betting-analysis.onrender.com/api/admin/retrain/status" \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
            echo "  Poll $i/10 — status: $status"
            if [ "$status" = "done" ]; then
              echo "Retrain completed successfully."
              exit 0
            elif [ "$status" = "failed" ]; then
              echo "Retrain FAILED. Check Render logs."
              exit 1
            fi
          done
          echo "Timeout after 50 min — retrain may still be running. Check manually."
